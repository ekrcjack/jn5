<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語カード N5</title>
<style>
  :root{
    --bg1:#16213E; --bg2:#0C1628;
    --ink:#EDE8DC; --ink-dim:rgba(237,232,220,.6); --ink-faint:rgba(237,232,220,.35);
    --gold:#C9A227; --gold-l:#E7C75A;
    --red:#E4572E; --red-l:#F08A6C;
    --green:#3E8E7E; --green-l:#7CC7B4;
    --paper:#FBF8EF; --navy:#1B2A4A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{overflow-x:hidden;}
  body{
    margin:0; min-height:100vh; width:100%;
    background:linear-gradient(175deg,var(--bg1) 0%,#0F1B33 70%,var(--bg2) 100%);
    color:var(--ink);
    font-family:'PingFang TC','Noto Sans TC','Hiragino Sans','Microsoft JhengHei',sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:20px 20px 32px;
    overflow-x:hidden;
  }
  .jp{font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif TC','PMingLiU',serif;}
  /* body 為 flex column，子項需限制寬度否則寬內容會撐破畫面 */
  body > *{min-width:0; max-width:100%;}
  .tabpanel{width:100%; max-width:100%; min-width:0;}
  .wrap{width:100%; max-width:420px; min-width:0; margin:0 auto;}
  header{display:flex; align-items:baseline; justify-content:space-between; min-width:0;}
  h1{font-size:22px; margin:0; letter-spacing:2px; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  h1 small{font-size:13px; color:var(--gold); letter-spacing:1px;}
  #stat{font-size:12px; color:var(--ink-dim); flex:none; white-space:nowrap;}
  #bar{height:4px; background:rgba(237,232,220,.15); border-radius:2px; margin:10px 0 14px;}
  #barfill{height:100%; width:0; background:var(--gold); border-radius:2px; transition:width .3s;}
  .chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;
    max-width:100%; -webkit-overflow-scrolling:touch;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    padding:6px 14px; border-radius:999px; font-size:13px; white-space:nowrap; cursor:pointer;
    border:1px solid rgba(237,232,220,.25); background:transparent; color:rgba(237,232,220,.75);
  }
  .chip.on{border-color:var(--gold); background:rgba(201,162,39,.18); color:var(--gold-l);}
  button:focus-visible{outline:2px solid var(--gold-l); outline-offset:2px;}
  #counter{font-size:12px; color:rgba(237,232,220,.5); margin:18px 0 10px; text-align:center;}
  #counter .hard{color:var(--red);}
  /* 卡片 */
  #stack{position:relative; width:100%; max-width:340px; height:300px; margin:0 auto;}
  .ghost{position:absolute; inset:0; border-radius:14px;}
  .g1{transform:rotate(3deg) translateY(6px); background:#E8E2D2; opacity:.35;}
  .g2{transform:rotate(-2deg) translateY(3px); background:#F2EDDE; opacity:.55;}
  #card{
    position:absolute; inset:0; border-radius:14px; border:none; cursor:pointer;
    background:var(--paper); box-shadow:0 10px 30px rgba(0,0,0,.35);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;
    transition:transform .22s ease, opacity .22s ease;
    touch-action:pan-y; user-select:none;
  }
  #card > *{pointer-events:none;}
  #card.out-r{transform:translateX(120%) rotate(8deg); opacity:0;}
  #card.out-l{transform:translateX(-120%) rotate(-8deg); opacity:0;}
  #card.dragging{transition:none;}
  .hole{position:absolute; top:14px; left:16px; width:18px; height:18px; border-radius:50%;
    background:var(--bg1); box-shadow:inset 0 1px 3px rgba(0,0,0,.6);}
  .ring{position:absolute; top:-8px; left:12px; width:26px; height:26px; border-radius:50%;
    border:3px solid #9AA3B2; border-bottom-color:transparent; border-left-color:transparent; transform:rotate(45deg);}
  .word{font-size:40px; color:var(--navy); font-weight:600; max-width:100%; text-align:center;
    word-break:break-word; overflow-wrap:anywhere; line-height:1.25;}
  .hint{margin-top:18px; font-size:12px; color:#8B8574; letter-spacing:2px;}
  .kana{font-size:24px; color:#3E5480; max-width:100%; text-align:center; word-break:break-word; overflow-wrap:anywhere;}
  .romaji{font-size:14px; color:#A99A6B; letter-spacing:1px; margin-top:2px; max-width:100%; text-align:center; word-break:break-word;}
  .word2{font-size:30px; color:var(--navy); font-weight:600; margin:6px 0 10px; max-width:100%;
    text-align:center; word-break:break-word; overflow-wrap:anywhere; line-height:1.25;}
  .rule{width:40px; height:1px; background:var(--gold); margin:4px 0 12px;}
  .zh{font-size:19px; color:#4A4432; max-width:100%; text-align:center; word-break:break-word; overflow-wrap:anywhere; line-height:1.4;}
  #speak{
    position:absolute; bottom:14px; right:14px; width:42px; height:42px; border-radius:50%;
    border:1px solid var(--gold); background:var(--paper); color:var(--gold); font-size:19px;
    cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.2);
    display:flex; align-items:center; justify-content:center;
    transition:transform .22s ease, opacity .22s ease;
  }
  #speak.out{opacity:0;}
  /* 動作按鈕 */
  #actions{display:flex; gap:8px; margin:24px auto 0; width:100%; max-width:360px; align-items:stretch;}
  #actions button{padding:14px 0; border-radius:12px; font-size:16px; cursor:pointer;}
  #btnYes, #btnNo{flex:1;}
  .navbtn{
    flex:none; width:46px; font-size:22px; line-height:1;
    border:1px solid rgba(237,232,220,.28); background:rgba(237,232,220,.06); color:var(--ink);
  }
  .navbtn:disabled{opacity:.3; cursor:default;}
  #btnNo{border:1px solid rgba(228,87,46,.6); background:rgba(228,87,46,.12); color:var(--red-l);}
  #btnYes{border:1px solid rgba(62,142,126,.6); background:rgba(62,142,126,.15); color:var(--green-l);}
  /* 訊息／結束畫面 */
  .center{margin-top:50px; text-align:center;}
  .big{font-size:30px; margin-bottom:8px;}
  .score{font-size:44px; color:var(--gold); font-weight:700; margin:10px 0;}
  .dim{color:var(--ink-dim); font-size:14px; margin-bottom:24px;}
  .row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  /* 測驗 */
  #quiz{width:100%; max-width:380px; margin-top:26px;}
  #qhead{font-size:12px; color:rgba(237,232,220,.5); margin-bottom:14px; text-align:center;}
  #qword{display:flex; align-items:center; justify-content:center; gap:12px;}
  #qword .word{font-size:40px;}
  #qkana{font-size:18px; color:var(--ink-dim); margin-top:6px; text-align:center;}
  #qromaji{font-size:14px; color:#8B8574; margin-top:2px; text-align:center; letter-spacing:1px;}
  #qspeak{width:38px; height:38px; border-radius:50%; border:1px solid rgba(201,162,39,.7);
    background:rgba(201,162,39,.15); color:var(--gold); font-size:17px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;}
  #opts{display:flex; flex-direction:column; gap:10px; margin-top:24px;}
  #opts button{
    padding:14px 16px; border-radius:12px; border:1px solid rgba(237,232,220,.2);
    background:rgba(237,232,220,.06); color:var(--ink); font-size:17px; text-align:left; cursor:pointer;
    transition:background .15s;
  }
  #opts button.ok{background:rgba(62,142,126,.25); border-color:var(--green);}
  #opts button.ng{background:rgba(228,87,46,.25); border-color:var(--red);}
  footer{margin-top:auto; padding-top:28px;}
  #reset{background:none; border:none; color:var(--ink-faint); font-size:12px; cursor:pointer; text-decoration:underline;}
  .hidden{display:none !important;}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}

  /* 分頁列 */
  .tabbar{width:100%; max-width:420px; margin:0 auto 4px; display:flex; gap:8px; min-width:0;}
  .tabbtn{
    flex:1; padding:10px 0; border-radius:10px; border:1px solid rgba(237,232,220,.2);
    background:rgba(237,232,220,.05); color:rgba(237,232,220,.65); font-size:14px; cursor:pointer;
  }
  .tabbtn.on{background:rgba(201,162,39,.18); border-color:var(--gold); color:var(--gold-l);}

  /* 五十音格 */
  .kanagrid{
    width:100%; max-width:420px; margin:16px auto 0; min-width:0;
    display:grid; grid-template-columns:repeat(10, 1fr); gap:6px;
  }
  .kanagrid.narrow{grid-template-columns:repeat(5, 1fr); max-width:260px;}
  .kanacell{
    aspect-ratio:1/1; border-radius:10px; border:1px solid rgba(237,232,220,.18);
    background:rgba(237,232,220,.05); color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:18px; min-width:0; padding:0;
  }
  .kanacell.jp{font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif TC','PMingLiU',serif;}
  .kanacell.blank{visibility:hidden; cursor:default;}
  .kanacell.on{background:rgba(201,162,39,.28); border-color:var(--gold); color:var(--gold-l);}
  .kanarow-n{width:100%; max-width:420px; margin:10px auto 0; display:flex; justify-content:flex-end;}
  .kanarow-n .kanacell{width:calc(10% - 5.4px); flex:none;}

  /* 記憶單字小卡 */
  .mnemo{
    width:100%; max-width:420px; margin:22px auto 0; background:var(--paper); border-radius:14px;
    padding:20px; display:flex; flex-direction:column; align-items:center; position:relative;
    box-shadow:0 10px 24px rgba(0,0,0,.3);
  }
  .mnemo .big{color:var(--navy); font-size:34px; font-weight:700; max-width:100%; text-align:center;
    word-break:break-word; overflow-wrap:anywhere;}
  .mnemo .word{color:#3E5480; font-size:22px; margin-top:6px; max-width:100%; text-align:center;
    word-break:break-word; overflow-wrap:anywhere;}
  .mnemo .romaji{color:#A99A6B; font-size:13px; margin-top:2px; max-width:100%; text-align:center;
    word-break:break-word; overflow-wrap:anywhere;}
  .mnemo .zh{color:#4A4432; font-size:17px; margin-top:8px; max-width:100%; text-align:center;
    word-break:break-word; overflow-wrap:anywhere;}
  .mnemo .rule{width:36px; height:1px; background:var(--gold); margin:10px 0 0; flex:none;}
  .mnemo .mnemoSpeakBtn{position:absolute; top:14px; right:14px;}

  /* 相關單字清單 */
  #kanaListHead{
    width:100%; max-width:420px; margin:22px auto 8px; font-size:13px; color:var(--ink-dim); text-align:center;
    padding:0 4px;
  }
  .klist{width:100%; max-width:420px; margin:0 auto; display:flex; flex-direction:column; gap:8px;}
  .klitem{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 14px; border-radius:10px; border:1px solid rgba(237,232,220,.15);
    background:rgba(237,232,220,.04);
  }
  .klitem .l{min-width:0; flex:1;}
  .klitem .l .k{font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif TC','PMingLiU',serif;
    font-size:19px; color:var(--ink); word-break:break-word; overflow-wrap:anywhere;}
  .klitem .l .r{font-size:12px; color:var(--ink-dim); margin-top:2px; word-break:break-word; overflow-wrap:anywhere;}
  .klitem .l .z{font-size:13px; color:rgba(237,232,220,.6); margin-top:2px; word-break:break-word; overflow-wrap:anywhere;}
  .klitem .spk{
    width:32px; height:32px; border-radius:50%; border:1px solid rgba(201,162,39,.7);
    background:rgba(201,162,39,.12); color:var(--gold); font-size:14px; cursor:pointer; flex:none;
    display:flex; align-items:center; justify-content:center;
  }
  .kempty{width:100%; max-width:420px; margin:10px auto; text-align:center; color:var(--ink-faint); font-size:13px; padding:0 4px;}
</style>
</head>
<body>

<div class="tabbar">
  <button class="tabbtn" data-tab="cards">單字卡</button>
  <button class="tabbtn" data-tab="hira">平假名</button>
  <button class="tabbtn" data-tab="kata">片假名</button>
</div>


<div id="tabCards" class="tabpanel">
<div class="wrap">
  <header>
    <h1 class="jp">単語カード <small>N5</small></h1>
    <span id="stat"></span>
  </header>
  <div id="bar"><div id="barfill"></div></div>
  <div class="chips" id="cats"></div>
  <div class="chips" style="margin-top:8px; flex-wrap:wrap; overflow:visible;">
    <button class="chip" id="chipUnknown">只看未熟記</button>
    <button class="chip" id="chipShuffle">隨機順序</button>
    <button class="chip" id="chipQuiz">測驗 10 題</button>
  </div>
</div>

<!-- 單字卡 -->
<div id="cardView">
  <div id="counter"></div>
  <div id="stack">
    <div class="ghost g1"></div>
    <div class="ghost g2"></div>
    <button id="card" aria-label="翻面看答案"></button>
    <button id="speak" aria-label="播放讀音">🔊</button>
  </div>
  <div id="actions">
    <button id="btnPrev" class="navbtn" aria-label="上一張">‹</button>
    <button id="btnYes">記住了 ✓</button>
    <button id="btnNo">不熟 ✕</button>
    <button id="btnNext" class="navbtn" aria-label="下一張">›</button>
  </div>
</div>

<!-- 全熟記訊息 -->
<div id="emptyView" class="center hidden">
  <div style="font-size:40px; margin-bottom:12px;">🎉</div>
  <div class="dim">這個範圍的單字都熟記了！</div>
  <div class="row"><button class="chip" id="btnShowAll">關閉「只看未熟記」</button></div>
</div>

<!-- 一輪結束 -->
<div id="doneView" class="center hidden">
  <div class="big jp">お疲れ様！</div>
  <div class="dim" id="doneMsg"></div>
  <div class="row">
    <button class="chip on" id="btnAgain">再來一輪</button>
    <button class="chip" id="btnQuiz2">測驗 10 題</button>
  </div>
</div>

<!-- 測驗 -->
<div id="quiz" class="hidden">
  <div id="qhead"></div>
  <div id="qword"><div class="word jp" id="qk"></div><button id="qspeak" aria-label="播放讀音">🔊</button></div>
  <div id="qkana" class="jp"></div>
  <div id="qromaji"></div>
  <div id="opts"></div>
</div>

<!-- 測驗結果 -->
<div id="quizDone" class="center hidden">
  <div class="big jp" id="qdTitle"></div>
  <div class="score" id="qdScore"></div>
  <div class="dim">答錯的單字已自動標記為「不熟」</div>
  <div class="row">
    <button class="chip on" id="btnQuizAgain">再測一次</button>
    <button class="chip" id="btnBack">回單字卡</button>
  </div>
</div>

<footer><button id="reset">清除全部進度</button></footer>
</div><!-- /tabCards -->

<!-- 平假名 -->
<div id="tabHira" class="tabpanel hidden">
  <div class="wrap">
    <header><h1 class="jp">ひらがな <small>五十音</small></h1></header>
  </div>
  <div id="kanaGridHira" class="kanagrid"></div>
  <div id="kanaGridHiraN" class="kanarow-n"></div>
  <div id="mnemoHira"></div>
</div>

<!-- 片假名 -->
<div id="tabKata" class="tabpanel hidden">
  <div class="wrap">
    <header><h1 class="jp">カタカナ <small>五十音</small></h1></header>
  </div>
  <div id="kanaGridKata" class="kanagrid"></div>
  <div id="kanaGridKataN" class="kanarow-n"></div>
  <div id="mnemoKata"></div>
</div>

// ============ 文字自動縮小（避免溢出卡片）============
function fitSize(text, base, min){
  min = min || Math.round(base*0.42);
  const len = [...String(text)].length;
  let size = base;
  if (len > 4)  size = base * 0.86;
  if (len > 6)  size = base * 0.70;
  if (len > 8)  size = base * 0.58;
  if (len > 11) size = base * 0.48;
  if (len > 15) size = base * 0.40;
  return Math.max(min, Math.round(size));
}

// ============ 手勢滑動 ============
let dragging = false, dragMoved = false, startX = 0, startY = 0, dragDX = 0, gestureDir = null;
const SWIPE_THRESHOLD = 55;

function onPointerDown(e){
  if ($("cardView").classList.contains("hidden")) return;
  dragging = true; dragMoved = false; dragDX = 0; gestureDir = null;
  startX = e.clientX; startY = e.clientY;
  $("card").classList.add("dragging");
  try { $("card").setPointerCapture(e.pointerId); } catch(err){}
}
function onPointerMove(e){
  if (!dragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  if (Math.abs(dx) > 6 || Math.abs(dy) > 6) dragMoved = true;
  // 判定手勢方向一次（水平 or 垂直），之後鎖定不再改變
  if (gestureDir === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)){
    gestureDir = Math.abs(dx) >= Math.abs(dy) ? "h" : "v";
  }
  if (gestureDir === "v") return;      // 垂直：讓頁面正常捲動
  if (gestureDir === "h" && e.cancelable) e.preventDefault();
  dragDX = dx;
  const rot = dx / 18;
  $("card").style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
  if (Math.abs(dx) > 20) { $("card").style.boxShadow = "0 10px 30px rgba(201,162,39,0.4)"; }
  else { $("card").style.boxShadow = ""; }
}
function onPointerUp(e){
  if (!dragging) return;
  dragging = false;
  $("card").classList.remove("dragging");
  $("card").style.boxShadow = "";
  const dx = dragDX;
  const moved = dragMoved, dir = gestureDir;
  $("card").style.transform = "";
  gestureDir = null;
  if (!moved || dir !== "h"){
    // 視為點擊：翻面
    flipped = !flipped; renderCard();
    return;
  }
  if (dx <= -SWIPE_THRESHOLD){
    prevCard();   // 左滑：上一張
  } else if (dx >= SWIPE_THRESHOLD){
    nextCard();   // 右滑：下一張
  }
  // 未達門檻：彈回原位（transform 已重設，靠 transition 回彈）
}

let jaVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  jaVoice = vs.find(v=>/^ja/i.test(v.lang)) || null;
}
if ("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP"; u.rate = 0.85;
  if (jaVoice) u.voice = jaVoice;
  speechSynthesis.speak(u);
}

const $ = id => document.getElementById(id);
function shuffle(a){
  a = [...a];
  for (let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pool(){
  let p = VOCAB.map((_,i)=>i);
  if (cat !== "全部") p = p.filter(i=>VOCAB[i].c === cat);
  if (onlyUnknown) p = p.filter(i=>!mastered.has(VOCAB[i].k));
  return p;
}
function show(view){
  ["cardView","emptyView","doneView","quiz","quizDone"].forEach(v=>$(v).classList.add("hidden"));
  $(view).classList.remove("hidden");
}

// ============ 分頁切換（單字卡／平假名／片假名）============
let activeTab = "cards";
let selectedKana = { hira: null, kata: null };

function switchTab(tab){
  activeTab = tab;
  ["tabCards","tabHira","tabKata"].forEach(id=>$(id).classList.add("hidden"));
  $(tab === "hira" ? "tabHira" : tab === "kata" ? "tabKata" : "tabCards").classList.remove("hidden");
  document.querySelectorAll(".tabbtn").forEach(b=>{
    b.classList.toggle("on", b.dataset.tab === tab);
  });
  if (tab === "hira") renderKanaGrid("hira");
  if (tab === "kata") renderKanaGrid("kata");
}

function wordsStartingWith(char){
  return VOCAB.filter(v => v.r && v.r.charAt(0) === char)
              .sort((a,b)=>a.r.localeCompare(b.r,"ja"));
}

function renderKanaGrid(script){
  const gridId = script === "hira" ? "kanaGridHira" : "kanaGridKata";
  const nId = script === "hira" ? "kanaGridHiraN" : "kanaGridKataN";
  const grid = $(gridId), nRow = $(nId);
  grid.innerHTML = ""; nRow.innerHTML = "";

  GOJUON_ROWS.forEach(row=>{
    row.forEach(hiraChar=>{
      const btn = document.createElement("button");
      if (hiraChar === null){
        btn.className = "kanacell blank";
      } else {
        const display = script === "hira" ? hiraChar : hiraToKata(hiraChar);
        btn.className = "kanacell jp" + (selectedKana[script] === hiraChar ? " on" : "");
        btn.textContent = display;
        btn.onclick = ()=>selectKana(hiraChar, script);
      }
      grid.appendChild(btn);
    });
  });
  // ん 獨立一格
  const nBtn = document.createElement("button");
  const nDisplay = script === "hira" ? GOJUON_N : hiraToKata(GOJUON_N);
  nBtn.className = "kanacell jp" + (selectedKana[script] === GOJUON_N ? " on" : "");
  nBtn.textContent = nDisplay;
  nBtn.onclick = ()=>selectKana(GOJUON_N, script);
  nRow.appendChild(nBtn);
}

function selectKana(hiraChar, script){
  selectedKana[script] = hiraChar;
  renderKanaGrid(script);
  renderMnemo(hiraChar, script);
}

function renderMnemo(hiraChar, script){
  const containerId = script === "hira" ? "mnemoHira" : "mnemoKata";
  const container = $(containerId);
  const m = MNEMO[hiraChar];
  const displayChar = script === "hira" ? hiraChar : hiraToKata(hiraChar);
  const word = script === "hira" ? m.hira : m.kata;
  const matches = wordsStartingWith(displayChar);

  let html = `
    <div class="mnemo">
      <button class="klitem spk mnemoSpeakBtn" data-speak="${word.replace(/"/g,'&quot;')}" aria-label="播放讀音">🔊</button>
      <div class="big jp">${displayChar}</div>
      <div class="word jp">${word}</div>
      <div class="romaji">${m.romaji}</div>
      <div class="rule"></div>
      <div class="zh">${m.zh}</div>
    </div>
    <div id="kanaListHead">以「${displayChar}」開頭的 N5 單字（${matches.length} 個）</div>
  `;
  if (matches.length === 0){
    html += `<div class="kempty">目前單字庫中沒有以「${displayChar}」開頭的字</div>`;
  } else {
    html += `<div class="klist">` + matches.map(v => `
      <div class="klitem">
        <div class="l">
          <div class="k jp">${v.k}</div>
          <div class="r jp">${v.r}　${v.romaji}</div>
          <div class="z">${v.zh}</div>
        </div>
        <button class="spk" data-speak="${v.r.replace(/"/g,'&quot;')}" aria-label="播放讀音">🔊</button>
      </div>
    `).join("") + `</div>`;
  }
  container.innerHTML = html;
  const mnemoBtn = container.querySelector(".mnemoSpeakBtn");
  if (mnemoBtn) mnemoBtn.onclick = ()=>speak(mnemoBtn.getAttribute("data-speak"));
  container.querySelectorAll("[data-speak]:not(.mnemoSpeakBtn)").forEach(btn=>{
    btn.onclick = ()=>speak(btn.getAttribute("data-speak"));
  });
}

// ============ 畫面更新 ============
function renderHeader(){
  const inCat = cat==="全部" ? VOCAB : VOCAB.filter(v=>v.c===cat);
  const m = inCat.filter(v=>mastered.has(v.k)).length;
  $("stat").textContent = `已熟記 ${m} / ${inCat.length}`;
  $("barfill").style.width = inCat.length ? (m/inCat.length*100)+"%" : "0";
}
function renderCats(){
  $("cats").innerHTML = "";
  CATS.forEach(c=>{
    const b = document.createElement("button");
    b.className = "chip" + (c===cat ? " on" : "");
    b.textContent = c;
    b.onclick = ()=>{ cat = c; newRound(); };
    $("cats").appendChild(b);
  });
  $("chipUnknown").className = "chip" + (onlyUnknown ? " on" : "");
  $("chipUnknown").textContent = (onlyUnknown ? "✓ " : "") + "只看未熟記";
  $("chipShuffle").className = "chip" + (shuffleOn ? " on" : "");
  $("chipShuffle").textContent = (shuffleOn ? "✓ " : "") + "隨機順序";
}
function renderCard(){
  renderHeader(); renderCats();
  if (deck.length === 0){ show("emptyView"); return; }
  show("cardView");
  const w = VOCAB[deck[pos]];
  $("counter").innerHTML = `${pos+1} / ${deck.length}　·　${w.c}` +
    (hard.has(w.k) ? `　<span class="hard">● 不熟</span>` : "");
  const card = $("card");
  card.classList.remove("out-r","out-l");
  $("speak").classList.remove("out");
  if (!flipped){
    const s1 = fitSize(w.k, 40, 18);
    card.innerHTML = `<div class="hole"></div><div class="ring"></div>
      <div class="word jp" style="font-size:${s1}px">${w.k}</div><div class="hint">點卡片看答案・左右滑動翻頁</div>`;
  } else {
    const sKana = fitSize(w.r, 24, 13);
    const sWord = fitSize(w.k, 30, 16);
    const sZh = fitSize(w.zh, 19, 12);
    card.innerHTML = `<div class="hole"></div><div class="ring"></div>
      <div class="kana jp" style="font-size:${sKana}px">${w.r}</div><div class="romaji">${w.romaji}</div>
      <div class="word2 jp" style="font-size:${sWord}px">${w.k}</div>
      <div class="rule"></div><div class="zh" style="font-size:${sZh}px">${w.zh}</div>`;
  }
  // 上一張／下一張 邊界時停用
  $("btnPrev").disabled = (pos <= 0);
  $("btnNext").disabled = (pos >= deck.length - 1);
}
function bounce(dir){
  const card = $("card");
  card.classList.add("dragging");
  card.style.transform = `translateX(${dir === "l" ? -24 : 24}px)`;
  setTimeout(()=>{ card.style.transform = ""; card.classList.remove("dragging"); }, 130);
}
// 上一張：回到前一張（不改變評分）
function prevCard(){
  if (pos <= 0){ bounce("l"); return; }
  pos--; flipped = false;
  $("card").classList.remove("out-r","out-l");
  $("card").style.transform = "";
  renderCard();
}
// 下一張：跳到下一張（不評分、不結束）
function nextCard(){
  if (pos >= deck.length - 1){ bounce("r"); return; }
  pos++; flipped = false;
  $("card").classList.remove("out-r","out-l");
  $("card").style.transform = "";
  renderCard();
}
function newRound(){
  deck = shuffleOn ? shuffle(pool()) : pool();
  pos = 0; flipped = false;
  renderCard();
}
function advance(know, dir){
  const w = VOCAB[deck[pos]];
  if (know){ mastered.add(w.k); hard.delete(w.k); }
  else { mastered.delete(w.k); hard.add(w.k); }
  save();
  const cls = dir === "l" ? "out-l" : dir === "r" ? "out-r" : (know ? "out-r" : "out-l");
  $("card").classList.add(cls);
  $("speak").classList.add("out");
  setTimeout(()=>{
    flipped = false;
    if (pos+1 >= deck.length){
      $("doneMsg").textContent = `這一輪 ${deck.length} 張卡片完成`;
      renderHeader(); show("doneView");
    } else { pos++; renderCard(); }
  }, 220);
}

// ============ 測驗 ============
function startQuiz(){
  const src = pool().length >= 4 ? pool() : VOCAB.map((_,i)=>i);
  quizQs = shuffle(src).slice(0, Math.min(10, src.length)).map(qi=>({
    qi, opts: shuffle([qi, ...shuffle(VOCAB.map((_,i)=>i).filter(i=>i!==qi)).slice(0,3)])
  }));
  quizPos = 0; quizScore = 0;
  renderQuiz();
}
function renderQuiz(){
  picked = false;
  show("quiz");
  const q = quizQs[quizPos], w = VOCAB[q.qi];
  $("qhead").textContent = `第 ${quizPos+1} / ${quizQs.length} 題　·　答對 ${quizScore}`;
  $("qk").textContent = w.k;
  $("qkana").textContent = w.r;
  $("qromaji").textContent = w.romaji;
  $("qspeak").onclick = ()=>speak(w.r);
  $("opts").innerHTML = "";
  q.opts.forEach(oi=>{
    const b = document.createElement("button");
    b.textContent = VOCAB[oi].zh;
    b.onclick = ()=>{
      if (picked) return;
      picked = true;
      const ok = oi === q.qi;
      if (ok) quizScore++;
      else { hard.add(w.k); save(); b.classList.add("ng"); }
      [...$("opts").children].forEach((btn,idx)=>{
        if (q.opts[idx] === q.qi) btn.classList.add("ok");
      });
      setTimeout(()=>{
        if (quizPos+1 >= quizQs.length){
          $("qdTitle").textContent = quizScore === quizQs.length ? "満点！すごい！" : "結果";
          $("qdScore").textContent = `${quizScore} / ${quizQs.length}`;
          renderHeader(); show("quizDone");
        } else { quizPos++; renderQuiz(); }
      }, 900);
    };
    $("opts").appendChild(b);
  });
}

// ============ 事件 ============
// 翻面已改由 pointerup 手勢處理（見上方 onPointerDown/Move/Up）
$("card").addEventListener("pointerdown", onPointerDown);
$("card").addEventListener("pointermove", onPointerMove);
$("card").addEventListener("pointerup", onPointerUp);
$("card").addEventListener("pointercancel", onPointerUp);
$("speak").onclick = e=>{ e.stopPropagation(); speak(VOCAB[deck[pos]].r); };
$("btnYes").onclick = ()=>advance(true);
$("btnNo").onclick = ()=>advance(false);
$("btnPrev").onclick = prevCard;
$("btnNext").onclick = nextCard;
$("chipUnknown").onclick = ()=>{ onlyUnknown = !onlyUnknown; newRound(); };
$("chipShuffle").onclick = ()=>{ shuffleOn = !shuffleOn; newRound(); };
$("chipQuiz").onclick = startQuiz;
$("btnQuiz2").onclick = startQuiz;
$("btnQuizAgain").onclick = startQuiz;
$("btnAgain").onclick = newRound;
$("btnBack").onclick = newRound;
$("btnShowAll").onclick = ()=>{ onlyUnknown = false; newRound(); };
$("reset").onclick = ()=>{
  if (confirm("確定要清除全部熟記進度嗎？")){
    mastered = new Set(); hard = new Set(); save(); newRound();
  }
};
// 鍵盤（僅單字卡分頁）：空白＝翻面、←＝記住了、→＝不熟、↑＝上一張、↓＝下一張、S＝發音
document.addEventListener("keydown", e=>{
  if (activeTab === "cards" && !$("cardView").classList.contains("hidden")){
    if (e.code === "Space"){ e.preventDefault(); flipped = !flipped; renderCard(); }
    else if (e.key === "ArrowLeft") advance(true);   // 左＝記住了（同左滑）
    else if (e.key === "ArrowRight") advance(false);  // 右＝不熟（同右滑）
    else if (e.key === "ArrowUp"){ e.preventDefault(); prevCard(); }
    else if (e.key === "ArrowDown"){ e.preventDefault(); nextCard(); }
    else if (e.key.toLowerCase() === "s") speak(VOCAB[deck[pos]].r);
  }
});

// 分頁按鈕
document.querySelectorAll(".tabbtn").forEach(b=>{
  b.onclick = ()=>switchTab(b.dataset.tab);
});

// 啟動
switchTab("cards");
newRound();
</script>
</body>
</html>
